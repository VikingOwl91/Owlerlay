<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0d0f1a" />
    <title>Owlerlay Remote</title>
    <style>
      :root {
        --ink: #0d0f1a;
        --card: #171a2b;
        --haze: #2a2f45;
        --moon: #eef1f8;
        --dim: #9aa0b8;
        --eye: #ffb23e;
        --run: #ffb23e;
        --ok: #5ad19b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--ink);
        color: var(--moon);
        padding: env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 14px);
        -webkit-font-smoothing: antialiased;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 10px;
        padding: 18px 4px 14px;
        position: sticky;
        top: 0;
        background: var(--ink);
      }
      h1 { font-size: 18px; margin: 0; letter-spacing: -0.01em; }
      h1 b { color: var(--eye); }
      .sub { color: var(--dim); font-size: 12.5px; }
      #status {
        margin-left: auto;
        font-size: 11px;
        color: var(--dim);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      #status .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--dim);
      }
      #status.live .dot { background: var(--ok); }
      .card {
        background: var(--card);
        border: 1px solid var(--haze);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 12px;
      }
      .label { font-size: 15px; font-weight: 600; }
      .time {
        font-variant-numeric: tabular-nums;
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0.01em;
        margin: 6px 0 12px;
      }
      .time.run { color: var(--run); }
      .time.done { color: var(--dim); }
      .row { display: flex; gap: 10px; }
      button {
        flex: 1;
        font: inherit;
        font-weight: 600;
        font-size: 15px;
        padding: 13px 0;
        border-radius: 11px;
        border: 1px solid var(--haze);
        background: #20243a;
        color: var(--moon);
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      button:active { transform: scale(0.97); }
      button.primary { background: var(--eye); color: #1a1300; border-color: var(--eye); }
      button.ghost { background: transparent; color: var(--dim); }
      #empty, #error {
        text-align: center;
        color: var(--dim);
        padding: 48px 16px;
        font-size: 14px;
      }
      #error { color: #ff8a8a; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Owler<b>lay</b> remote</h1>
        <div class="sub">control your timers</div>
      </div>
      <span id="status"><span class="dot"></span><span id="statustext">connecting…</span></span>
    </header>

    <main id="list"></main>
    <div id="empty" hidden>No timers yet. Create one in the desktop app.</div>
    <div id="error" hidden></div>

    <script>
      // Capability token: prefer the URL (?t=…), fall back to a previously saved
      // one so a manual reload without the query still works.
      const params = new URLSearchParams(location.search);
      let token = params.get("t");
      if (token) localStorage.setItem("owlerlay_token", token);
      else token = localStorage.getItem("owlerlay_token");

      const listEl = document.getElementById("list");
      const emptyEl = document.getElementById("empty");
      const errorEl = document.getElementById("error");
      const statusEl = document.getElementById("status");
      const statusText = document.getElementById("statustext");

      let items = [];

      function fmt(ms) {
        const total = Math.max(0, Math.round(ms / 1000));
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;
        const pad = (n) => String(n).padStart(2, "0");
        return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
      }

      function actions(state) {
        // Mirrors the desktop control surface.
        const reset = { action: "reset", label: "Reset", cls: "ghost" };
        if (state === "Running") return [{ action: "pause", label: "Pause", cls: "" }, reset];
        if (state === "Paused") return [{ action: "resume", label: "Resume", cls: "primary" }, reset];
        // Idle or Finished
        return [{ action: "start", label: "Start", cls: "primary" }, reset];
      }

      function render() {
        emptyEl.hidden = items.length > 0;
        listEl.innerHTML = "";
        for (const c of items) {
          const card = document.createElement("div");
          card.className = "card";
          card.dataset.id = c.id;

          const label = document.createElement("div");
          label.className = "label";
          label.textContent = c.label;

          const time = document.createElement("div");
          time.className = "time";
          time.dataset.role = "time";
          paintTime(time, c.duration, c.state);

          const row = document.createElement("div");
          row.className = "row";
          for (const a of actions(c.state)) {
            const b = document.createElement("button");
            b.className = a.cls;
            b.textContent = a.label;
            b.onclick = () => control(c.id, a.action);
            row.appendChild(b);
          }

          card.append(label, time, row);
          listEl.appendChild(card);
        }
      }

      function paintTime(el, ms, state) {
        el.textContent = fmt(ms);
        el.classList.toggle("run", state === "Running");
        el.classList.toggle("done", state === "Finished");
      }

      async function api(path, opts) {
        const sep = path.includes("?") ? "&" : "?";
        const res = await fetch(`${path}${sep}t=${encodeURIComponent(token || "")}`, opts);
        if (res.status === 401) throw new Error("Unauthorized — re-scan the QR code.");
        if (res.status === 404) throw new Error("Remote is disabled on the desktop app.");
        if (!res.ok) throw new Error(`Request failed (${res.status}).`);
        return res;
      }

      async function load() {
        try {
          const res = await api("/api/remote/countdowns");
          items = await res.json();
          errorEl.hidden = true;
          render();
        } catch (e) {
          showError(e.message);
        }
      }

      async function control(id, action) {
        try {
          await api(`/api/remote/countdowns/${id}/${action}`, { method: "POST" });
          // State change arrives over SSE; no optimistic update needed.
        } catch (e) {
          showError(e.message);
        }
      }

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.hidden = false;
      }

      function setLive(live) {
        statusEl.classList.toggle("live", live);
        statusText.textContent = live ? "live" : "reconnecting…";
      }

      function connect() {
        const es = new EventSource(`/api/remote/sse?t=${encodeURIComponent(token || "")}`);
        es.onopen = () => {
          setLive(true);
          // Resync on every (re)connect — events missed while disconnected are
          // not replayed, so refetch the full list to catch up.
          load();
        };
        es.onerror = () => setLive(false); // EventSource auto-reconnects
        es.addEventListener("tick", (ev) => {
          const { id, remaining_ms } = JSON.parse(ev.data);
          const c = items.find((i) => i.id === id);
          if (c) {
            c.duration = remaining_ms;
            const el = listEl.querySelector(`.card[data-id="${id}"] [data-role="time"]`);
            if (el) paintTime(el, remaining_ms, c.state);
          }
        });
        es.addEventListener("state", (ev) => {
          const { id, state } = JSON.parse(ev.data);
          const c = items.find((i) => i.id === id);
          if (c) {
            c.state = state;
            render(); // buttons + time styling depend on state
          }
        });
        es.addEventListener("changed", load); // create/delete/config
      }

      if (!token) {
        showError("Missing access token — open the link from the desktop QR code.");
      } else {
        load();
        connect();
      }
    </script>
  </body>
</html>
